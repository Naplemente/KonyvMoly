<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/favicon.png">
<title>Bejelentkezés</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4e73df,#1cc88a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4e73df;
color:white;
border:none;
border-radius:5px;
}

.error{
color:red;
text-align:center;
margin-bottom:10px;
}

.footer {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    color: #888;
}
  
</style>
</head>

<body>

<div class="login-box">

<h2 style="text-align: center;">Bejelentkezés</h2>

{% if error %}
<div class="error">Hibás email vagy jelszó</div>
{% endif %}

<form method="post" action="/login">

<input type="text" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Jelszó" required>

<button type="submit">Bejelentkezés</button>
</form>

<div style="text-align:center; margin-top:10px;">
    <a href="/forgot-password">Elfelejtetted a jelszót?</a>
</div>
    
</div>
<footer class="footer">
    © 2026 Murkoff Corporation
</footer>
</body>
</html>
