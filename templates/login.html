<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/static/favicon.png">
<title>Bejelentkezés</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(17, 24, 39, 0.85);
    --accent: #3b82f6;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --danger: #ef4444;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: system-ui;
    height: 100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text);
}

/* CARD */
.login-box {
    background: var(--card);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 0.4s ease;
}

/* ANIM */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #1f2937;
    color: white;
}

input::placeholder {
    color: #6b7280;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

/* ERROR */
.error {
    color: var(--danger);
    margin-bottom: 10px;
}

/* LINK */
a {
    display: block;
    margin-top: 15px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    color: white;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    color: var(--muted);
    font-size: 12px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Bejelentkezés</h2>

{% if error %}
<div class="error">Hibás email vagy jelszó</div>
{% endif %}

<form method="post" action="/login">
<input type="text" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Jelszó" required>
<button type="submit">Bejelentkezés</button>
</form>

<a href="/forgot-password">Elfelejtetted a jelszót?</a>

</div>

<footer class="footer">
    © 2026 Murkoff Corporation
</footer>

</body>
</html>
