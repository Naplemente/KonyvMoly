<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Elfelejtett jelszó</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(17, 24, 39, 0.85);
    --accent: #3b82f6;
    --text: #e5e7eb;
    --muted: #9ca3af;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: system-ui;
    height: 100vh;
    background: radial-gradient(circle at top, #1e293b, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text);
}

/* CARD */
.box {
    background: var(--card);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 16px;
    width: 360px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 0.4s ease;
}

/* ANIM */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #1f2937;
    color: white;
}

/* BUTTON */
button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.9;
}

/* MESSAGE */
p {
    margin-top: 15px;
    color: #a5f3fc;
    font-size: 14px;
}

/* LINK */
a {
    display: block;
    margin-top: 20px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    color: white;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 10px;
    right: 15px;
    color: var(--muted);
    font-size: 12px;
}
</style>

</head>
<body>

<div class="box">
    <h2>Elfelejtett jelszó</h2>

    <form method="post">
        <input type="email" name="email" placeholder="Email cím" required>
        <button type="submit">Jelszó visszaállítás</button>
    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <a href="/login">← Vissza a bejelentkezéshez</a>
</div>

<div class="footer">
    © 2026 Murkoff Corporation
</div>

</body>
</html>
